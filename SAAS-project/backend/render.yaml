# Render Blueprint - lets you deploy the backend + a Postgres database
# together with one click via "New +" -> "Blueprint" on render.com,
# pointing at your repo.

databases:
  - name: stockflow-db
    plan: free

services:
  - type: web
    name: stockflow-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
