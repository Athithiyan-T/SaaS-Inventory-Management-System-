databases:
  - name: stockflow-db
    plan: free

services:
  - type: web
    name: stockflow-backend
    runtime: python
    plan: free
    rootDir: SAAS-project/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
